<!DOCTYPE html>

      </div>
      
    <script>
          mapboxgl.accessToken = "pk.eyJ1IjoiY2JlbGwwMyIsImEiOiJjbW5na3d5OWEwOXNxMnNwdW9hN3h6anBzIn0.AVLJ2P3FBcfoaTRYjPBLSA";
   
        
          var map = new mapboxgl.Map({
